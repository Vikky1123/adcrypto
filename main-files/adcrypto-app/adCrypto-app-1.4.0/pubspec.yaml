name: adcrypto
description: adCrypto ui

version: 1.4.0+5

environment:
  sdk: ">=3.5.0 <4.2.0"
  flutter: 3.24.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: 1.0.8
  # manually added dependency
  get: 4.6.6
  flutter_screenutil: 5.9.3
  google_fonts: 6.2.1
  font_awesome_flutter: 10.7.0
  country_code_picker: ^3.0.0
  material_design_icons_flutter: 7.0.7296
  get_storage: ^2.0.3
  logger: 2.4.0
  pin_code_fields: 8.0.1
  intl: 0.19.0
  image_picker: 1.1.2
  dotted_line: ^3.2.2
  flutter_svg:
  slider_button: 2.1.0
  iconsax: ^0.0.8
  toggle_switch: ^2.1.0
  flutter_custom_clippers: ^2.1.0
  qr_flutter: ^4.1.0
  dotted_border: 2.1.0
  share_plus: 10.0.2
  cached_network_image:
  flutter_spinkit: ^5.2.0
  http: 1.2.2
  path:
  dropdown_button2:
  mime: 1.0.6
  dotted_decoration: ^2.0.0
  flutter_animate: 4.5.0
  flutter_inappwebview: ^6.0.0
  flutter_html: ^3.0.0-beta.2
  dart_code_metrics:
  file_picker: 8.1.2
  connectivity_plus: 6.0.5
  rename_app: ^1.6.1

dependency_overrides:
  modal_bottom_sheet: ^3.0.0-pre

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: 4.0.0
  flutter_launcher_icons: 0.13.1
  change_app_package_name: ^1.1.0

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/app-launcher.png"

flutter_gen:
  output: lib/custom_assets/ # Optional (default: lib/gen/)
  line_length: 80 # Optional (default: 80)
#  flutter packages pub run build_runner build
#  fluttergen -c pubspec.yaml  # only for mac

flutter:

  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/clipart/
    - assets/icon/
    - assets/logo/